name: Track IETF & ITU-T Documents

on:
  push:
    branches:
      - main
  schedule:
    # Run weekly on Mondays at 00:00 UTC
    - cron: '0 0 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape-and-generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 html2text

      - name: Create scraper script
        run: |
          cat > scraper.py << 'PYTHON_EOF'
          import os
          import re
          import sys
          import time
          import requests
          from bs4 import BeautifulSoup
          from pathlib import Path

          def fetch_rfc_index():
              """Scrape RFC index and return list of RFC numbers with metadata"""
              print("Fetching RFC index...")
              url = "https://www.rfc-editor.org/rfc-index.html"

              try:
                  response = requests.get(url, timeout=30, headers={
                      'User-Agent': 'Mozilla/5.0 (compatible; DocBot/1.0)'
                  })
                  response.raise_for_status()

                  soup = BeautifulSoup(response.text, 'html.parser')
                  text_content = soup.get_text()
                  rfc_matches = re.findall(r'RFC\s*(\d+)', text_content, re.I)

                  rfcs = [f"rfc{num}" for num in rfc_matches]
                  rfcs = sorted(set(rfcs), key=lambda x: int(x[3:]))[-100:]

                  print(f"Found {len(rfcs)} RFCs from index")
                  return rfcs[:20]  # Limit to 20 per run

              except Exception as e:
                  print(f"Error fetching RFC index: {e}")
                  return [f"rfc{i}" for i in range(9100, 9120)]

          def fetch_rfc_content(rfc_num):
              """Fetch RFC content and convert to markdown"""
              print(f"Fetching {rfc_num}...")
              url = f"https://www.rfc-editor.org/rfc/{rfc_num}.txt"

              try:
                  response = requests.get(url, timeout=30)
                  response.raise_for_status()
                  content = response.text

                  lines = content.split('\n')
                  title = rfc_num.upper()

                  for i, line in enumerate(lines[:50]):
                      if line.strip() and len(line.strip()) > 20 and line.strip().isupper():
                          title = line.strip()
                          break

                  markdown = f"{url}\n\n"
                  markdown += f"# {title}\n\n"
                  markdown += "## Metadata\n\n"

                  for i, line in enumerate(lines[:30]):
                      if any(keyword in line.lower() for keyword in ['request for comments', 'obsoletes', 'updates', 'category', 'status']):
                          markdown += f"- {line.strip()}\n"

                  markdown += "\n## Content\n\n"
                  markdown += "```\n"
                  markdown += content[:10000]
                  markdown += "\n```\n\n"
                  markdown += "*(Content truncated for brevity)*\n"

                  return markdown
              except Exception as e:
                  print(f"Error fetching {rfc_num}: {e}")
                  return None

          def fetch_itut_recommendations():
              """Generate ITU-T recommendations from common series"""
              print("Generating ITU-T recommendations...")
              series = ['X', 'Y', 'G', 'H', 'I', 'Q', 'T', 'V']
              recommendations = []

              for s in series:
                  for num in [25, 50, 75, 100, 200, 400, 500, 600, 700, 800, 900, 1000]:
                      recommendations.append(f"{s}.{num}")

              return recommendations[:30]

          def fetch_itut_content(rec_id):
              """Fetch ITU-T recommendation content"""
              print(f"Fetching {rec_id}...")

              rec_formatted = rec_id.replace('.', '')
              urls_to_try = [
                  f"https://www.itu.int/rec/T-REC-{rec_id}/en",
                  f"https://www.itu.int/ITU-T/recommendations/rec.aspx?rec={rec_formatted}",
              ]

              summary = "No summary available"

              for url in urls_to_try:
                  try:
                      response = requests.get(url, timeout=20, headers={
                          'User-Agent': 'Mozilla/5.0 (compatible; DocBot/1.0)'
                      })
                      if response.status_code == 200:
                          soup = BeautifulSoup(response.text, 'html.parser')
                          title_elem = soup.find('title')
                          if title_elem:
                              summary = title_elem.get_text(strip=True)
                              break
                  except Exception:
                      continue

              markdown = f"{urls_to_try[0]}\n\n"
              markdown += f"# ITU-T {rec_id}\n\n"
              markdown += f"**Summary:** {summary}\n\n"
              markdown += "## Overview\n\n"
              markdown += f"This is ITU-T Recommendation {rec_id}.\n\n"
              markdown += "TODO: Add detailed content\n"

              return markdown

          def generate_index():
              """Generate the main index file"""
              print("Generating index...")

              index_content = "# Documentation Index\n\n"
              index_content += "Auto-generated index of IETF and ITU-T documentation.\n\n"
              index_content += f"Last updated: {time.strftime('%Y-%m-%d %H:%M:%S UTC', time.gmtime())}\n\n"

              index_content += "## IETF RFCs\n\n"
              ietf_files = sorted(Path("docsMirror/ietf").glob("*.md"))

              for file in ietf_files:
                  with open(file, 'r') as f:
                      lines = f.readlines()
                      title = lines[2].replace('#', '').strip() if len(lines) > 2 else file.stem
                      url = lines[0].strip() if lines else ""

                  index_content += f"- [`{file.stem}`](ietf/{file.name})\n"
                  index_content += f"  - **Title:** {title}\n"
                  index_content += f"  - **Source:** {url}\n\n"

              index_content += "## ITU-T Recommendations\n\n"
              itut_files = sorted(Path("docsMirror/ituT").glob("*.md"))

              for file in itut_files:
                  with open(file, 'r') as f:
                      lines = f.readlines()
                      title = lines[2].replace('#', '').strip() if len(lines) > 2 else file.stem
                      url = lines[0].strip() if lines else ""

                  index_content += f"- [`{file.stem}`](ituT/{file.name})\n"
                  index_content += f"  - **Title:** {title}\n"
                  index_content += f"  - **Source:** {url}\n\n"

              index_content += "---\n*Generated by GitHub Actions*\n"

              with open("docsMirror/INDEX.md", 'w') as f:
                  f.write(index_content)

              print("Index generated at docsMirror/INDEX.md")

          def main():
              os.makedirs("docsMirror/ietf", exist_ok=True)
              os.makedirs("docsMirror/ituT", exist_ok=True)

              existing_ietf = set(f.stem for f in Path("docsMirror/ietf").glob("*.md"))
              existing_itut = set(f.stem for f in Path("docsMirror/ituT").glob("*.md"))

              new_files = []

              print("\n=== Scraping IETF RFCs ===")
              rfcs = fetch_rfc_index()
              print(f"Will process {len(rfcs)} RFCs")

              for rfc in rfcs:
                  if rfc in existing_ietf:
                      print(f"Skipping {rfc} (already exists)")
                      continue

                  content = fetch_rfc_content(rfc)
                  if content:
                      output_path = f"docsMirror/ietf/{rfc}.md"
                      with open(output_path, 'w') as f:
                          f.write(content)
                      print(f"✓ Created {output_path}")
                      new_files.append(output_path)
                      time.sleep(0.5)

              print("\n=== Scraping ITU-T Recommendations ===")
              recommendations = fetch_itut_recommendations()
              print(f"Will process {len(recommendations)} recommendations")

              for rec in recommendations:
                  if rec in existing_itut:
                      print(f"Skipping {rec} (already exists)")
                      continue

                  content = fetch_itut_content(rec)
                  if content:
                      output_path = f"docsMirror/ituT/{rec}.md"
                      with open(output_path, 'w') as f:
                          f.write(content)
                      print(f"✓ Created {output_path}")
                      new_files.append(output_path)
                      time.sleep(0.5)

              if list(Path("docsMirror/ietf").glob("*.md")) or list(Path("docsMirror/ituT").glob("*.md")):
                  generate_index()

              with open("new_files.txt", 'w') as f:
                  f.write('\n'.join(new_files))

              print(f"\n=== Summary ===")
              print(f"Generated {len(new_files)} new files")
              print(f"- IETF: {len([f for f in new_files if 'ietf' in f])} files")
              print(f"- ITU-T: {len([f for f in new_files if 'ituT' in f])} files")

              if new_files:
                  sys.exit(0)
              else:
                  sys.exit(1)

          if __name__ == "__main__":
              main()
          PYTHON_EOF

      - name: Run scraper
        id: scrape
        continue-on-error: true
        run: |
          python scraper.py
          if [ $? -eq 0 ]; then
            echo "has_new_files=true" >> $GITHUB_OUTPUT
          else
            echo "has_new_files=false" >> $GITHUB_OUTPUT
          fi

      - name: Verify index was generated
        if: steps.scrape.outputs.has_new_files == 'true'
        run: |
          if [ -f "docsMirror/INDEX.md" ]; then
            echo "✓ Index generated successfully"
            echo "Total files: $(find docsMirror -name "*.md" -not -name "INDEX.md" | wc -l)"
          else
            echo "⚠ Warning: Index not generated"
            exit 1
          fi

      - name: Create summary of new files
        if: steps.scrape.outputs.has_new_files == 'true'
        run: |
          echo "### 📚 New Documentation Generated" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -f new_files.txt ]; then
            ietf_count=$(grep -c "docsMirror/ietf/" new_files.txt || echo "0")
            itut_count=$(grep -c "docsMirror/ituT/" new_files.txt || echo "0")

            echo "**IETF RFCs:** $ietf_count new files" >> $GITHUB_STEP_SUMMARY
            echo "**ITU-T Recommendations:** $itut_count new files" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY

            echo "#### Files created:" >> $GITHUB_STEP_SUMMARY
            while IFS= read -r file; do
              if [ -n "$file" ]; then
                echo "- \`$file\`" >> $GITHUB_STEP_SUMMARY
              fi
            done < new_files.txt
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📄 View full index: [docsMirror/INDEX.md](./docsMirror/INDEX.md)" >> $GITHUB_STEP_SUMMARY

      - name: Commit generated files and index
        if: steps.scrape.outputs.has_new_files == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docsMirror/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "docs: auto-generate IETF/ITU-T documents

          Scraped and generated markdown from official sources

          Co-Authored-By: GitHub Actions <github-actions[bot]@users.noreply.github.com>"
            git push
          fi
